name: Generate Profile Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      style:
        description: 'Animation style'
        required: true
        default: 'noid'
        type: choice
        options:
          - noid
          - snake

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Noid boids ---
      - uses: actions/setup-node@v4
        if: ${{ github.event.inputs.style == 'noid' || github.event_name == 'schedule' }}
        with:
          node-version: '20'

      - name: Generate noid SVGs
        if: ${{ github.event.inputs.style == 'noid' || github.event_name == 'schedule' }}
        run: |
          node src/main.js
          cp dist/noid-contrib.svg dist/profile-animation.svg
          cp dist/noid-contrib-dark.svg dist/profile-animation-dark.svg
        env:
          GITHUB_USER: canaanmckenzie
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTPUT_DIR: dist

      # --- Snake ---
      - name: Generate snake SVGs
        if: ${{ github.event.inputs.style == 'snake' }}
        uses: Platane/snk@v3
        with:
          github_user_name: canaanmckenzie
          outputs: |
            dist/profile-animation.svg
            dist/profile-animation-dark.svg?palette=github-dark

      # --- Deploy ---
      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
